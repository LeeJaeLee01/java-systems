spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: wallet-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/wallets/**
        - id: payment-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/payments/**
        - id: notification-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/notifications/**
        - id: fraud-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/fraud/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
