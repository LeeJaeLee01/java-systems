spring:
  application:
    name: fraud-service
  datasource:
    url: jdbc:postgresql://localhost:5432/fraud_db
    username: payment
    password: payment
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: fraud-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

server:
  port: 8085

management:
  endpoints:
    web:
      exposure:
        include: health,info

fraud:
  velocity:
    key-prefix: "fraud:velocity:user:"
    window-seconds: 10
    max-transactions: 5
    key-ttl-buffer-seconds: 5
