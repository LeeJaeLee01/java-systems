spring:
  datasource:
    url: jdbc:h2:mem:paymentdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
  task:
    scheduling:
      enabled: false
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: embedded

payment:
  reconciliation:
    enabled: false

services:
  wallet:
    base-url: http://localhost:8082

stripe:
  api-key: sk_test_dummy
  webhook-secret: whsec_dummy
  webhook-tolerance-seconds: 300
