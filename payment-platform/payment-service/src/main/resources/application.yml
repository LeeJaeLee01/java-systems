spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://localhost:5432/payment_db
    username: payment
    password: payment
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info

services:
  wallet:
    base-url: http://localhost:8082

payment:
  idempotency:
    response-key-prefix: "idempotency:response:"
    processing-key-prefix: "idempotency:processing:"
    response-ttl-hours: 24
    processing-ttl-minutes: 5
  outbox:
    poll-interval-ms: 5000
    batch-size: 50
    max-retries: 5
    initial-retry-delay-seconds: 30
    publish-timeout-seconds: 10
    claim-stale-seconds: 300
  reconciliation:
    enabled: true
    cron: "0 0 2 * * *"
    lookback-days: 1
    default-currency: usd

stripe:
  api-key: ${STRIPE_API_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  webhook-tolerance-seconds: ${STRIPE_WEBHOOK_TOLERANCE_SECONDS:300}
