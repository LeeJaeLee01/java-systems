spring:
  datasource:
    url: jdbc:h2:mem:notificationdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

notification:
  executor:
    core-pool-size: 2
    max-pool-size: 2
    queue-capacity: 5
  ses:
    enabled: false
  sms:
    enabled: false
