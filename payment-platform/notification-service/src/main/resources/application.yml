spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://localhost:5432/notification_db
    username: payment
    password: payment
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health,info

notification:
  executor:
    core-pool-size: 4
    max-pool-size: 8
    queue-capacity: 100
    thread-name-prefix: notification-
  ses:
    enabled: false
    region: us-east-1
    from-email: noreply@paymentsystem.local
  sms:
    enabled: false
    region: us-east-1
    default-country-code: "+1"
